---
layout: default
---
<article class="container">
  <header class="post-header">
    <div class="date">{{ page.date | date: "%B %-d, %Y" }}</div>
    <h1>{{ page.title }}</h1>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <a class="back-link" href="{{ '/writing/' | relative_url }}">← All writing</a>
</article>

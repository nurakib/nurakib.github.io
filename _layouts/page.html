---
layout: default
---
<div class="container{% if page.wide %} container--wide{% endif %}">
  {% if page.title %}<h1 style="margin-top:48px;">{{ page.title }}</h1>{% endif %}
  {% if page.subtitle %}<p class="tagline" style="color:var(--muted);margin-top:6px;">{{ page.subtitle }}</p>{% endif %}
  {{ content }}
</div>
